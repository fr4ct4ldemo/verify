<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification - Discord Bot</title>
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }
        
        .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .captcha-container {
            display: flex;
            justify-content: center;
            margin: 25px 0;
        }
        
        .h-captcha {
            transform: scale(0.9);
            transform-origin: center;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: #fff;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #2980b9, #1f6dad);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(52, 152, 219, 0.4);
        }
        
        .btn-primary:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }
        
        .message.error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.5);
            color: #e74c3c;
        }
        
        .message.success {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid rgba(46, 204, 113, 0.5);
            color: #2ecc71;
        }
        
        .message.info {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid rgba(52, 152, 219, 0.5);
            color: #3498db;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .attempts-info {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-top: 10px;
        }
        
        .footer {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🛡️</div>
            <h1>Discord Verification</h1>
            <p>Complete the captcha to verify your account</p>
        </div>
        
        {% if error %}
        <div class="message error">{{ error }}</div>
        {% endif %}
        
        {% if success %}
        <div class="message success">{{ success }}</div>
        {% endif %}
        
        {% if token and not error %}
        <div class="captcha-container">
            <div class="h-captcha" data-sitekey="{{ site_key }}"></div>
        </div>
        
        <button class="btn btn-primary" id="verifyBtn" onclick="submitVerification()">
            Verify
        </button>
        
        <div class="attempts-info">
            You have 3 attempts to complete verification
        </div>
        {% endif %}
        
        <div class="footer">
            Protected by hCaptcha
        </div>
    </div>
    
    <script>
        let isSubmitting = false;
        
        async function submitVerification() {
            if (isSubmitting) return;
            
            const btn = document.getElementById('verifyBtn');
            const hcaptchaResponse = hcaptcha.getResponse();
            
            if (!hcaptchaResponse) {
                alert('Please complete the hCaptcha first');
                return;
            }
            
            isSubmitting = true;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Verifying...';
            
            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        hcaptcha_token: hcaptchaResponse,
                        token: '{{ token }}'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.querySelector('.container').innerHTML = `
                        <div class="header">
                            <div class="icon">✅</div>
                            <h1>Verification Successful!</h1>
                            <p>You have been verified on the Discord server</p>
                        </div>
                        <div class="message success">
                            Your account has been verified. You can now access the server.
                        </div>
                    `;
                } else {
                    if (data.locked) {
                        document.querySelector('.container').innerHTML = `
                            <div class="header">
                                <div class="icon">⏰</div>
                                <h1>Temporarily Locked Out</h1>
                            </div>
                            <div class="message error">
                                ${data.message}
                            </div>
                        `;
                    } else {
                        hcaptcha.reset();
                        alert(data.message);
                        btn.innerHTML = 'Verify';
                        btn.disabled = false;
                        isSubmitting = false;
                        
                        if (data.attempts_remaining !== undefined) {
                            document.querySelector('.attempts-info').textContent = 
                                `You have ${data.attempts_remaining} attempt(s) remaining`;
                        }
                    }
                }
            } catch (error) {
                alert('An error occurred. Please try again.');
                btn.innerHTML = 'Verify';
                btn.disabled = false;
                isSubmitting = false;
            }
        }
    </script>
</body>
</html>
